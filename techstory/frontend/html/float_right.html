<!DOCTYPE html>
<html>
<head><title>float 배치</title>
<style>
#float {
float : right;
border : 1px dotted black;
width : 8em;
padding : 0.25em;
margin : 1em;
/* em은 글자 크기를 기준으로 하는 단위입니다. 1em은 현재 글자 크기와 같습니다. 예를 들어, 글자 크기가 16px인 경우 1em은 16px입니다. 따라서 0.25em은 4px가 됩니다. */
}
</style>
</head>
<body>
<h3>학기말 공지</h3>
<hr>
<div>
<p id="float">
24일은 피아니스트 조성진의 크리스마스 특별
연주가 있습니다.</p>
<p>
이제 곧 겨울 방학이 시작됩니다. 학기 중 못다한
Java, C++ 프로그래밍 열심히 하기 바랍니다.
인턴을 준비하는 학생들은 프로젝트 개발에
더욱 힘쓰세요. 그럼 다음 학기에 만나요.</p>
</div>
</body>
</html>
