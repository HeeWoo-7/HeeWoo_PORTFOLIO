<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        //3000번 DOM이 수정되는 극단적인 과정, 4500ms 소요되는 과정
        function onClick(){
        const ul = document.getElementById("list");
        for (let i = 0; i < 3000; i++) {
          ul.innerHTML += "<li>${i+1}</li>";
        }
      
        }

    </script>
</head>
<body>
    <h3>Dom 트리 수정과정</h3>
    <hr>
    <button onclick="onClick()">리스트 추가하기</button>
    <ul id="list"></ul>
</body>
</html>
