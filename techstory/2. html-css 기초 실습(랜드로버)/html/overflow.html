<!DOCTYPE html>
<html>
<head>
<title>overflow 프로퍼티</title>
<style>
p {
width : 15em;
height : 3em;
border : 1px solid lightgray;
}
.hidden { overflow : hidden; }/* overflow : hidden;는 박스의 크기를 넘어가는 콘텐트를 잘라서 보이지 않게 합니다. */
.visible { overflow : visible; }/* overflow : visible;는 박스의 크기를 넘어가는 콘텐트도 출력합니다. */
.scroll { overflow : auto;} /* overflow : auto;는 박스의 크기를 넘어가는 콘텐트가 있을 때 스크롤바를 붙여 출력합니다. */
</style>
</head>
<body>
<h3>overflow 프로퍼티</h3>
<hr>
<p class="hidden">overflow에 hidden 값을 적용하면
박스를 넘어가는 내용이 잘려 보이지 않습니다.</p><br>
<p class="visible">overflow에 visible 값을 적용하면
콘텐트가 박스를 넘어가서도 출력됩니다</p><br>
<p class="scroll">overflow에 scroll 값을 적용하면
박스에 스크롤바를 붙여 출력합니다.</p>
</body>
</html>
