<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

     span{display: inline-block;
        width: 300px;
         height: 300px;
         background-color: bisque;}/*인라인 태그*/
    div{ border: solid black 1px;} /*블록 태그*/
/* div,p{display: inline;} */
 /*블록 태그를 인라인으로 바꿔줌*/
        /* h1{display: none;} */
         /*블록 태그를 안보이게 바꿔줌*/
          h1{ visibility: hidden;} /*블록 태그는 자리를 차지하지만 안보이게 바꿔줌*/
          h1:hover{visibility: visible;} /*블록 태그에 마우스를 올리면 보이게 바꿔줌*/
        body{margin: 5;}
    </style>
</head>
<body>
    <div>div</div>
    <div>div</div>
    <p>p</p>
    <h1>h1</h1>
    <div><span>block span</span>과 <span>block span</span>입니다.</div>
</body>
</html>
