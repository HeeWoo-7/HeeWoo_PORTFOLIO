<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h3>prompt 로 값 입력받기</h3>
    <hr>
    <script>
        let name=prompt("이름을 입력하세요",  "홍길동");
        if(name == null){
            console.log("이름을 입력하지 않았습니다.");
        } else {
            console.log(name + "님 환영합니다.");
        }
        console.log(name);
    </script>
</body>
</html>
